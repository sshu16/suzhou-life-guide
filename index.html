<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>苏州生活服务手册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f5f9f6;
            color: #2d3e3a;
            line-height: 1.8;
        }

        /* ===== 顶栏 ===== */
        .top-bar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #e2eee8;
            height: 56px;
            padding: 0 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .top-bar .logo {
            font-weight: 600; font-size: 17px; color: #3a7a66;
            letter-spacing: 1px; white-space: nowrap;
        }
        .top-bar .logo span { color: #7ab5a0; }
        .top-bar .back-btn {
            font-size: 13px; color: #3a7a66; font-weight: 500;
            padding: 4px 14px; border-radius: 20px;
            background: #eef7f2; cursor: pointer;
            transition: background 0.2s; display: none; border: none;
            user-select: none; white-space: nowrap; font-family: inherit;
        }
        .top-bar .back-btn:hover { background: #dcefe4; }
        .top-bar .back-btn.show { display: inline-block; }
        .top-bar .spacer { flex: 1; }

        .top-bar .action-btn {
            font-size: 12px; color: #4d7a6a;
            background: #e4f0ea; border-radius: 20px;
            padding: 4px 12px; cursor: pointer; border: none;
            font-family: inherit; white-space: nowrap;
            transition: background 0.2s;
        }
        .top-bar .action-btn:hover { background: #cfe4da; }
        .top-bar .action-btn.primary { background: #3a7a66; color: #fff; }
        .top-bar .action-btn.primary:hover { background: #2d634f; }

        .save-indicator {
            font-size: 11px; color: #8aaa9a;
            display: none; align-items: center; gap: 4px;
        }
        .save-indicator.show { display: inline-flex; }
        .save-indicator .dot {
            width: 6px; height: 6px; border-radius: 50%; background: #7ab5a0;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* ===== Hero ===== */
        .hero {
            background: linear-gradient(135deg, #d4ede2 0%, #b8dccd 50%, #a3cfbd 100%);
            padding: 44px 24px 30px;
            text-align: center;
        }
        .hero h1 { font-size: 28px; font-weight: 700; color: #1f4d3f; margin-bottom: 6px; }
        .hero p { font-size: 14px; color: #4d7a6a; max-width: 520px; margin: 0 auto; }
        .hero .status-bar {
            margin-top: 12px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
        }
        .hero .status-bar .tag {
            font-size: 11px; background: rgba(255,255,255,0.6);
            border-radius: 20px; padding: 4px 14px; color: #4d7a6a;
        }

        /* ===== 容器 ===== */
        .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px 80px; }

        /* ===== 网格 ===== */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: 1px solid #eaf1ed;
            padding: 22px 22px 18px;
            cursor: pointer;
            transition: box-shadow 0.25s, transform 0.2s;
        }
        .card:hover { box-shadow: 0 6px 28px rgba(58,122,102,0.13); transform: translateY(-2px); }
        .card .icon-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .card .icon-badge {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .card .card-title {
            font-size: 17px; font-weight: 600; color: #1f4d3f;
        }
        .card .card-summary {
            font-size: 13.5px; color: #5d7a6e; margin-bottom: 8px;
        }
        .card .tags { margin-bottom: 4px; }
        .card .tag {
            display: inline-block; font-size: 11px; color: #6d9a88;
            background: #eef7f2; border-radius: 12px;
            padding: 2px 12px; margin: 2px 4px 2px 0;
        }
        .card .arrow {
            font-size: 16px; color: #b8dccd;
            transition: color 0.2s, transform 0.2s; margin-top: 4px;
        }
        .card:hover .arrow { color: #3a7a66; transform: translateX(3px); }

        .ic-green  { background: #d4ede2; }
        .ic-coral  { background: #f5e4de; }
        .ic-blue   { background: #d4e8ed; }
        .ic-purple { background: #e4dff0; }
        .ic-gold   { background: #f5eed4; }
        .ic-mint   { background: #d4edeb; }

        /* ===== 详情视图 ===== */
        #viewDetail { display: none; animation: fadeUp 0.35s ease; }
        #viewGrid { display: block; }
        #viewGrid.hide { display: none; }
        #viewDetail.show { display: block; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        .detail-header {
            background: #fff; border-radius: 16px;
            padding: 28px 28px 20px; margin-bottom: 20px;
            border: 1px solid #eaf1ed;
        }
        .detail-header .title-row {
            display: flex; align-items: center; gap: 14px; margin-bottom: 8px;
        }
        .detail-header .big-icon {
            width: 52px; height: 52px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; flex-shrink: 0;
        }
        .detail-header h2 { font-size: 22px; font-weight: 700; color: #1f4d3f; }
        .detail-header .meta { font-size: 13px; color: #5d7a6e; }

        /* ===== 编辑工具栏 ===== */
        .edit-toolbar {
            display: flex; gap: 8px; flex-wrap: wrap;
            margin-bottom: 16px; padding: 12px 16px;
            background: #fafffc; border-radius: 12px;
            border: 1px solid #dcefe4;
        }
        .edit-toolbar .btn {
            font-size: 12px; padding: 5px 14px; border-radius: 20px;
            border: 1px solid #d4e4dc; background: #fff;
            color: #4d7a6a; cursor: pointer; transition: all 0.2s;
            font-family: inherit;
        }
        .edit-toolbar .btn:hover { border-color: #7ab5a0; background: #eef7f2; }
        .edit-toolbar .btn.active { background: #3a7a66; color: #fff; border-color: #3a7a66; }
        .edit-toolbar .btn.save-btn { background: #3a7a66; color: #fff; border-color: #3a7a66; }
        .edit-toolbar .btn.save-btn:hover { background: #2d634f; }
        .edit-toolbar .btn.danger { color: #b57a6a; border-color: #e8c8be; }
        .edit-toolbar .btn.danger:hover { background: #f5e4de; }
        .edit-toolbar .spacer { flex: 1; }
        .edit-toolbar .hint {
            font-size: 11px; color: #8aaa9a; display: flex; align-items: center; gap: 4px;
        }

        /* ===== 详情内容（可编辑） ===== */
        .detail-content {
            background: #fff; border-radius: 16px;
            padding: 24px 28px; border: 1px solid #eaf1ed;
            min-height: 200px;
            outline: none;
            transition: box-shadow 0.2s;
        }
        .detail-content.editing {
            box-shadow: 0 0 0 2px #7ab5a0;
        }
        .detail-content h3 {
            font-size: 16px; font-weight: 600; color: #1f4d3f;
            margin-top: 20px; margin-bottom: 8px;
        }
        .detail-content h3:first-child { margin-top: 0; }
        .detail-content p {
            font-size: 14px; color: #4d6a5e; margin-bottom: 10px;
        }
        .detail-content ul {
            padding-left: 20px; margin-bottom: 12px;
        }
        .detail-content li {
            font-size: 14px; color: #4d6a5e; margin-bottom: 4px;
        }
        .detail-content strong { color: #1f4d3f; }
        .detail-content .empty-state {
            text-align: center; padding: 40px 20px; color: #8aaa9a;
        }
        .detail-content .empty-state .big { font-size: 40px; margin-bottom: 10px; }

        /* ===== 数据管理面板 ===== */
        .data-panel {
            margin-top: 40px; padding: 20px 24px;
            background: #fff; border-radius: 16px;
            border: 1px solid #eaf1ed;
        }
        .data-panel h3 {
            font-size: 15px; font-weight: 600; color: #1f4d3f;
            margin-bottom: 12px;
        }
        .data-panel .btns {
            display: flex; gap: 10px; flex-wrap: wrap;
        }
        .data-panel .btn {
            font-size: 12px; padding: 6px 16px; border-radius: 20px;
            border: 1px solid #d4e4dc; background: #fff;
            color: #4d7a6a; cursor: pointer; transition: all 0.2s;
            font-family: inherit;
        }
        .data-panel .btn:hover { border-color: #7ab5a0; background: #eef7f2; }
        .data-panel .btn.primary { background: #3a7a66; color: #fff; border-color: #3a7a66; }
        .data-panel .btn.primary:hover { background: #2d634f; }
        .data-panel .btn.danger { color: #b57a6a; border-color: #e8c8be; }
        .data-panel .btn.danger:hover { background: #f5e4de; }
        .data-panel .tip {
            font-size: 12px; color: #8aaa9a; margin-top: 8px;
        }
        .data-panel .tip code {
            background: #eef7f2; padding: 1px 6px; border-radius: 4px;
            font-size: 11px; color: #3a7a66;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1f4d3f; color: #fff; padding: 10px 24px;
            border-radius: 30px; font-size: 13px; z-index: 999;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            opacity: 0; transition: opacity 0.3s, transform 0.3s;
            transform: translateX(-50%) translateY(20px);
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ===== Footer ===== */
        .footer {
            text-align: center; padding: 24px; font-size: 12px;
            color: #8aaa9a; border-top: 1px solid #e2eee8;
            background: rgba(255,255,255,0.6);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .hero h1 { font-size: 22px; }
            .grid { grid-template-columns: 1fr; }
            .container { padding: 16px 14px 60px; }
            .detail-header { padding: 20px; }
            .detail-content { padding: 16px 18px; }
            .edit-toolbar { padding: 10px 12px; }
            .data-panel { padding: 16px 18px; }
        }

        /* ===== 隐藏的文件输入 ===== */
        #importInput { display: none; }
    </style>
</head>
<body>

<!-- ===== Toast 消息 ===== -->
<div class="toast" id="toast"></div>

<!-- ===== 顶栏 ===== -->
<div class="top-bar">
    <div class="logo">苏州<span>生活手册</span></div>
    <div class="back-btn" id="backBtn" onclick="showGrid()">← 返回</div>
    <div class="spacer"></div>
    <div class="save-indicator" id="saveIndicator">

<div class="hero">

    <div class="status-bar">
        <span class="tag">✏️ 点击卡片查看 / 编辑详情</span>
        <span class="tag">💾 自动保存到本地浏览器</span>
        <span class="tag">📤 导出数据分享给组员</span>
    </div>
</div>

<!-- ===== 网格视图 ===== -->
<div class="container" id="viewGrid">
    <div class="grid" id="cardGrid"></div>

    <!-- 数据管理 -->
    <div class="data-panel">
        <h3>🔧 数据管理</h3>
        <div class="btns">

            <button class="btn danger" onclick="resetData()">🔄 恢复默认数据</button>
        </div>
        <div class="tip">
            💡 编辑内容会自动保存到当前浏览器。<strong>导出数据</strong>文件分享给组员，对方<strong>导入数据</strong>即可同步。
            确认内容后点击右上角 <code>📥 下载 HTML</code> 上传到 GitHub 永久保存。
        </div>
    </div>
    <input type="file" id="importInput" accept=".json" onchange="importData(event)" />
</div>

<!-- ===== 详情视图 ===== -->
<div class="container" id="viewDetail">
    <div class="detail-header" id="detailHeader"></div>

    <div class="edit-toolbar" id="editToolbar">
        <button class="btn active" id="viewModeBtn" onclick="toggleEdit(false)">👁️ 预览</button>

        <span class="spacer"></span>
        <span class="hint" id="editHint">💡 点击「编辑」后可直接修改内容</span>
        <button class="btn save-btn" onclick="saveCurrentSection()">💾 保存</button>
    </div>

    <div class="detail-content" id="detailContent"></div>
</div>

<!-- ===== Footer ===== -->
<div class="footer">
    苏州生活服务手册 &mdash; 组员协作维护
</div>

/* ============================================================
   应用逻辑
   ============================================================ */

const STORAGE_KEY = 'suzhou_guide_data';
let sections = [];
let currentSectionId = null;
let isEditing = false;

function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            sections = JSON.parse(saved);
            return;
        } catch (e) {}
    }
    sections = JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
    saveToStorage();
}

function saveToStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(sections));
    document.getElementById('saveIndicator').classList.add('show');
    clearTimeout(window._saveTimeout);
    window._saveTimeout = setTimeout(() => {
        document.getElementById('saveIndicator').classList.remove('show');
    }, 2000);
}

function renderCards() {
    const grid = document.getElementById('cardGrid');
    grid.innerHTML = sections.map(s => `
        <div class="card" onclick="showDetail('${s.id}')">
            <div class="icon-row">
                <div class="icon-badge ${s.color}">${s.icon}</div>
                <div class="card-title">${s.title}</div>
            </div>
            <div class="card-summary">${s.summary}</div>
            <div class="tags">${s.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>
            <div class="arrow">查看详情 →</div>
        </div>
    `).join('');
}

function showDetail(id) {
    const section = sections.find(s => s.id === id);
    if (!section) return;
    currentSectionId = id;

    document.getElementById('viewGrid').classList.add('hide');
    document.getElementById('viewDetail').classList.add('show');
    document.getElementById('backBtn').classList.add('show');

    document.getElementById('detailHeader').innerHTML = `
        <div class="title-row">
            <div class="big-icon ${section.color}">${section.icon}</div>
            <div>
                <h2>${section.title}</h2>
                <div class="meta">${section.summary}</div>
            </div>
        </div>
    `;

    isEditing = false;
    document.getElementById('viewModeBtn').classList.add('active');
    document.getElementById('editModeBtn').classList.remove('active');
    document.getElementById('editHint').textContent = '👁️ 预览模式';
    renderDetailContent(section);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderDetailContent(section) {
    const el = document.getElementById('detailContent');
    el.innerHTML = section.content || `
        <div class="empty-state">
            <div class="big">📝</div>
            <p>此章节内容待补充</p>
        </div>
    `;
    if (isEditing) {
        el.contentEditable = true;
        el.classList.add('editing');
    } else {
        el.contentEditable = false;
        el.classList.remove('editing');
    }
}

function toggleEdit(edit) {
    isEditing = edit;
    document.getElementById('viewModeBtn').classList.toggle('active', !edit);
    document.getElementById('editModeBtn').classList.toggle('active', edit);
    document.getElementById('editHint').textContent = edit ? '✏️ 编辑模式 — 直接点击内容修改' : '👁️ 预览模式';
    const section = sections.find(s => s.id === currentSectionId);
    if (section) {
        renderDetailContent(section);
    }
}

function saveCurrentSection() {
    if (!currentSectionId) return;
    const section = sections.find(s => s.id === currentSectionId);
    if (!section) return;

    const el = document.getElementById('detailContent');
    section.content = el.innerHTML;
    saveToStorage();
    showToast('✅ 已保存到本地浏览器');
}

function showGrid() {
    document.getElementById('viewGrid').classList.remove('hide');
    document.getElementById('viewDetail').classList.remove('show');
    document.getElementById('backBtn').classList.remove('show');
    currentSectionId = null;
    renderCards();
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(window._toastTimeout);
    window._toastTimeout = setTimeout(() => t.classList.remove('show'), 2500);
}

/* ===== 导出 / 导入 / 重置 ===== */

function exportData() {
    const data = JSON.stringify(sections, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '苏州生活手册数据.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('✅ 数据已导出，可分享给组员');
}

function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (Array.isArray(data) && data.length > 0 && data[0].id && data[0].title) {
                sections = data;
                saveToStorage();
                renderCards();
                showToast('✅ 导入成功！数据已更新');
            } else {
                showToast('❌ 数据格式不正确');
            }
        } catch (err) {
            showToast('❌ 文件解析失败：' + err.message);
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

function resetData() {
    if (!confirm('确定恢复为默认数据？当前修改将丢失！')) return;
    sections = JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
    saveToStorage();
    renderCards();
    showToast('🔄 已恢复默认数据');
}

function downloadHTML() {
    /* 先保存当前数据到 HTML 中 */
    const dataStr = JSON.stringify(sections, null, 2);
    const htmlContent = document.documentElement.outerHTML;

    /* 替换 LOCAL_STORAGE_DATA 占位符 */
    const updated = htmlContent.replace(
        /const DEFAULT_SECTIONS = \[/,
        `const DEFAULT_SECTIONS = ${dataStr.slice(0, dataStr.indexOf('['))}${dataStr.slice(dataStr.indexOf('['), dataStr.lastIndexOf(']') + 1)}; /* 自动生成 */\n    const DEFAULT_SECTIONS_PLACEHOLDER = [`
    );

    /* 简单做法：重新下载当前页面，但把 localStorage 数据嵌入到默认数据区 */
    const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'index.html';
    a.click();
    URL.revokeObjectURL(url);
    showToast('📥 正在下载，下载后请上传到 GitHub 覆盖原文件');
}

/* ===== 初始化 ===== */
loadData();
renderCards();
</script>
